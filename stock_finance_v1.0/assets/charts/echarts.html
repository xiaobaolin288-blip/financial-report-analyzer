<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #0f1419; overflow: hidden; }
    #chart { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="chart"></div>
  <script>
    const chart = echarts.init(document.getElementById('chart'), null, { renderer: 'canvas' });
    window.addEventListener('resize', () => chart.resize());

    function emptyOption(title) {
      return {
        backgroundColor: 'transparent',
        title: { text: title || '暂无数据', left: 'center', top: 'middle', textStyle: { color: '#8b9cb3', fontSize: 16 } }
      };
    }

    function lineOption(payload) {
      return {
        backgroundColor: 'transparent',
        animationDuration: 1200,
        animationEasing: 'cubicOut',
        title: { text: payload.title || '', left: 12, top: 8, textStyle: { color: '#e8edf4', fontSize: 15 } },
        tooltip: { trigger: 'axis' },
        grid: { left: 56, right: 24, top: 56, bottom: 48 },
        xAxis: {
          type: 'category',
          data: payload.categories || [],
          axisLabel: { color: '#8b9cb3', rotate: payload.categories?.length > 8 ? 35 : 0 },
          axisLine: { lineStyle: { color: '#2a3544' } }
        },
        yAxis: {
          type: 'value',
          axisLabel: { color: '#8b9cb3' },
          splitLine: { lineStyle: { color: '#1e2836' } }
        },
        series: [{
          name: payload.series_name || '',
          type: 'line',
          smooth: true,
          symbol: 'circle',
          symbolSize: 8,
          lineStyle: { width: 3, color: '#3d8bfd' },
          areaStyle: {
            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
              { offset: 0, color: 'rgba(61, 139, 253, 0.35)' },
              { offset: 1, color: 'rgba(61, 139, 253, 0.02)' }
            ])
          },
          itemStyle: { color: '#6eb6ff' },
          data: payload.values || []
        }]
      };
    }

    function barOption(payload) {
      return {
        backgroundColor: 'transparent',
        animationDuration: 1000,
        animationEasing: 'elasticOut',
        title: { text: payload.title || '', left: 12, top: 8, textStyle: { color: '#e8edf4', fontSize: 15 } },
        tooltip: { trigger: 'axis' },
        grid: { left: 56, right: 24, top: 56, bottom: 72 },
        xAxis: {
          type: 'category',
          data: payload.categories || [],
          axisLabel: { color: '#8b9cb3', interval: 0 },
          axisLine: { lineStyle: { color: '#2a3544' } }
        },
        yAxis: {
          type: 'value',
          axisLabel: { color: '#8b9cb3' },
          splitLine: { lineStyle: { color: '#1e2836' } }
        },
        series: [{
          name: payload.series_name || '',
          type: 'bar',
          barMaxWidth: 48,
          itemStyle: {
            borderRadius: [6, 6, 0, 0],
            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
              { offset: 0, color: '#5ad8a6' },
              { offset: 1, color: '#1a7f5a' }
            ])
          },
          data: payload.values || []
        }]
      };
    }

    window.renderChart = function(type, payload) {
      if (!payload || !payload.values || payload.values.length === 0) {
        chart.setOption(emptyOption(payload?.title), true);
        return;
      }
      const option = type === 'bar' ? barOption(payload) : lineOption(payload);
      chart.setOption(option, true);
    };

    chart.setOption(emptyOption('等待数据…'));
  </script>
</body>
</html>
